---
- name: "Fase 1 - Configuracion base del router CSR1000v"
  hosts: routers
  gather_facts: no
  connection: network_cli

  tasks:

    - name: Configurar hostname
      ios_config:
        lines:
          - "hostname {{ router_hostname }}"

    - name: Configurar dominio (necesario para llaves SSH)
      ios_config:
        lines:
          - "ip domain-name {{ domain_name }}"

    - name: Configurar servidor NTP
      ios_config:
        lines:
          - "ntp server {{ ntp_server }}"

    - name: Crear usuario administrativo (privilegio 15)
      ios_config:
        lines:
          - "username {{ admin_user }} privilege 15 secret {{ admin_password }}"

    - name: Crear usuario de solo lectura (privilegio 1)
      ios_config:
        lines:
          - "username {{ readonly_user }} privilege 1 secret {{ readonly_password }}"

    - name: Verificar si ya existe una llave RSA
      ios_command:
        commands:
          - "show crypto key mypubkey rsa"
      register: rsa_check

    - name: Generar llave RSA para SSH (solo si no existe)
      ios_command:
        commands:
          - command: "crypto key generate rsa modulus 2048"
            prompt: ['Do you really want to replace them?']
            answer: ['yes']
      when: "'Key name' not in rsa_check.stdout[0]"

    - name: Configurar SSH version 2 y timeouts
      ios_config:
        lines:
          - "ip ssh version 2"
          - "ip ssh time-out 60"
          - "ip ssh authentication-retries 3"

    - name: Configurar VTY para usar SSH y login local
      ios_config:
        lines:
          - "transport input ssh"
          - "login local"
        parents: "line vty 0 4"

    - name: Configurar bloqueo de login tras intentos fallidos (seguridad)
      ios_config:
        lines:
          - "login block-for {{ login_block_seconds }} attempts {{ login_attempts }} within {{ login_watch_seconds }}"
          - "login on-failure log"
          - "login on-success log"

    - name: Habilitar logging de seguridad (buffer y timestamps)
      ios_config:
        lines:
          - "logging buffered 16384"
          - "service timestamps log datetime msec"

    - name: Habilitar log config dentro de archive
      ios_config:
        lines:
          - "log config"
        parents: "archive"
      ignore_errors: yes

    - name: Habilitar logging enable dentro de log config
      ios_config:
        lines:
          - "logging enable"
        parents:
          - "archive"
          - "log config"
      ignore_errors: yes

    - name: Configurar descripcion de la interfaz fisica (management)
      ios_config:
        lines:
          - "description Interfaz de Management - Enlace a DevASC"
        parents: "interface {{ physical_interface }}"

    - name: Crear subinterfaces (VLANs) con encapsulacion dot1Q
      ios_config:
        lines:
          - "encapsulation dot1Q {{ item.id }}"
          - "ip address {{ item.ip }} {{ item.mask }}"
          - "description {{ item.desc }}"
          - "no shutdown"
        parents: "interface {{ physical_interface }}.{{ item.id }}"
      loop: "{{ vlans }}"

    - name: Guardar configuracion (write memory)
      ios_config:
        save_when: always
